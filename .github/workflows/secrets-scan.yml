name: Secrets Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --config .gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF report
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  notify:
    name: Discord Alert
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog]
    if: failure()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<'EOF'
          {
            "content": "🚨 **Secret detected in ${{ github.repository }}**",
            "embeds": [
              {
                "title": "Secret Leak Detected",
                "color": 16711680,
                "fields": [
                  { "name": "Repository", "value": "`${{ github.repository }}`", "inline": true },
                  { "name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true },
                  { "name": "Commit", "value": "`${{ github.sha }}`", "inline": false },
                  { "name": "Triggered by", "value": "`${{ github.actor }}`", "inline": true },
                  { "name": "Workflow Run", "value": "[View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )"
