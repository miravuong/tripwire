name: Secrets Scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --config .gitleaks.toml --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload SARIF report
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  notify:
    name: Discord Alert
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog]
    if: failure()
    steps:
      - name: Send detection event to Tripwire endpoint
        env:
          TRIPWIRE_EVENT_WEBHOOK_URL: ${{ secrets.TRIPWIRE_EVENT_WEBHOOK_URL }}
        run: |
          if [ -z "$TRIPWIRE_EVENT_WEBHOOK_URL" ]; then
            echo "TRIPWIRE_EVENT_WEBHOOK_URL is not set; skipping event delivery."
            exit 0
          fi

          DETECTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl -sf -X POST "$TRIPWIRE_EVENT_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<'EOF'
          {
            "repository": "${{ github.repository }}",
            "branch": "${{ github.ref_name }}",
            "commit_sha": "${{ github.sha }}",
            "rule": "scanner-detected-secret",
            "file_path": "unknown",
            "author": "${{ github.actor }}",
            "source": "github-actions",
            "detected_at": "__DETECTED_AT__"
          }
          EOF
          | sed "s|__DETECTED_AT__|${DETECTED_AT}|g")"

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping Discord alert."
            exit 0
          fi

          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "$(cat <<'EOF'
          {
            "content": "🚨 **Secret detected in ${{ github.repository }}**",
            "embeds": [
              {
                "title": "Secret Leak Detected",
                "color": 16711680,
                "fields": [
                  { "name": "Repository", "value": "`${{ github.repository }}`", "inline": true },
                  { "name": "Branch", "value": "`${{ github.ref_name }}`", "inline": true },
                  { "name": "Commit", "value": "`${{ github.sha }}`", "inline": false },
                  { "name": "Triggered by", "value": "`${{ github.actor }}`", "inline": true },
                  { "name": "Workflow Run", "value": "[View details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )"
