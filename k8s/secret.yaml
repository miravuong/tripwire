# Secret is created imperatively from .env file:
#   kubectl create secret generic tripwire-secrets --from-env-file=.env
#
# Required keys in .env:
#   TRIPWIRE_WEBHOOK_TOKEN=<shared-event-webhook-token>
#   DISCORD_WEBHOOK_URL=<your-webhook-url>
#   SLACK_WEBHOOK_URL=<your-slack-webhook-url>   # optional
#   VAULT_TOKEN=<your-vault-token>
